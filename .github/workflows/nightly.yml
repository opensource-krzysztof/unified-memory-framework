  icx:
   name: ICX
   env:
     VCPKG_PATH: ""
   strategy:
     matrix:
       os: ['windows-2019', 'windows-2022']
       build_type: [Debug]
       compiler: [{c: icx, cxx: icx}]
       shared_library: ['ON', 'OFF']
       include:
         - os: windows-2022
           build_type: Release
           compiler: {c: icx, cxx: icx}
           shared_library: 'ON'
  
   runs-on: ${{matrix.os}}
  
   steps:
   - name: Checkout
     uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
     with:
       fetch-depth: 0
  
   - name: Initialize vcpkg
     uses: lukka/run-vcpkg@5e0cab206a5ea620130caf672fce3e4a6b5666a1 # v11.5
     with:
       vcpkgGitCommitId: ea2a964f9303270322cf3f2d51c265ba146c422d # 1.04.2025
       vcpkgDirectory: ${{env.BUILD_DIR}}/vcpkg
       vcpkgJsonGlob: '**/vcpkg.json'
  
   - name: Install dependencies.
     run: vcpkg install --triplet x64-windows
  
   - name: Install Ninja
     uses: seanmiddleditch/gha-setup-ninja@3b1f8f94a2f8254bd26914c4ab9474d4f0015f67 # v6
  
   - name: Download icx compiler
     env:
       # Link source: https://www.intel.com/content/www/us/en/developer/tools/oneapi/dpc-compiler-download.html
       CMPLR_LINK: "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/15a35578-2f9a-4f39-804b-3906e0a5f8fc/w_dpcpp-cpp-compiler_p_2024.2.1.83_offline.exe"
     run: |
       Invoke-WebRequest -Uri "${{ env.CMPLR_LINK }}" -OutFile compiler_install.exe
  
   - name: Install icx compiler
     shell: cmd
     run: |
       start /b /wait .\compiler_install.exe -s -x -f extracted --log extract.log
       extracted\bootstrapper.exe -s --action install --eula=accept -p=NEED_VS2017_INTEGRATION=0 ^
         -p=NEED_VS2019_INTEGRATION=0 -p=NEED_VS2022_INTEGRATION=0 --log-dir=.



   # - name: Install llvm-mingw
   #   run: |
   #     curl -LO https://github.com/mstorsjo/llvm-mingw/releases/download/20250430/llvm-mingw-20250430-ucrt-x86_64.zip
   # - name: Install llvm-mingw (extract)
   #   run: |
   #     powershell Expand-Archive llvm-mingw*.zip -DestinationPath .
   #     del llvm-mingw*.zip
   #     mv llvm-mingw* c:\llvm-mingw
   #     echo "c:\llvm-mingw\bin" | Out-File -FilePath $Env:GITHUB_PATH -Encoding utf8 -Append
   #     dir "c:\llvm-mingw\bin"
   # - name: cmake version
   #   run: |
   #     cmake --version
   #     make --version
   #     gcc --version
   - name: Check vars
     shell: cmd
     run: |
       call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat"
       call "C:\Program Files (x86)\Intel\oneAPI\setvars-vcvarsall.bat"

       
   - name: Install MSYS2
     uses: msys2/setup-msys2@v2
     with:
       msystem: mingw64
       path-type: inherit
       update: true
       install: "make cmake"



      
   - name: Configure build
     shell: msys2 {0}
     run: |
       echo 'export CI=true' >> ~/.bashrc
       echo 'export CMAKE_PREFIX_PATH="/c/Program Files (x86)/Intel/oneAPI/tbb/latest/env:/c/Program Files (x86)/Intel/oneAPI/dpl/latest/lib/cmake/oneDPL:/c/Program Files (x86)/Intel/oneAPI/compiler/latest"' >> ~/.bashrc
       echo 'export CMPLR_ROOT="/c/Program Files (x86)/Intel/oneAPI/compiler/latest"' >> ~/.bashrc
       echo 'export COBERTURA_HOME="/c/cobertura-2.1.1"' >> ~/.bashrc
       echo 'export CommandPromptType=Native' >> ~/.bashrc
       echo 'export CommonProgramFiles="/c/Program Files/Common Files"' >> ~/.bashrc
       echo 'export CONDA="/c/Miniconda"' >> ~/.bashrc
       echo 'export CPATH="/c/Program Files (x86)/Intel/oneAPI/tbb/latest/include:/c/Program Files (x86)/Intel/oneAPI/ocloc/latest/include:/c/Program Files (x86)/Intel/oneAPI/dpl/latest/include:/c/Program Files (x86)/Intel/oneAPI/dev-utilities/latest/include:/c/Program Files (x86)/Intel/oneAPI/compiler/latest/include"' >> ~/.bashrc
       echo 'export DEPLOYMENT_BASEPATH="/c/actions"' >> ~/.bashrc
       echo 'export DevEnvDir="/c/Program Files (x86)/Microsoft Visual Studio/2019/Enterprise/Common7/IDE"' >> ~/.bashrc
       echo 'export DIAGUTIL_PATH="/c/Program Files (x86)/Intel/oneAPI/debugger/latest/etc/debugger/sys_check"' >> ~/.bashrc
